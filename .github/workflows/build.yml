name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .\.venv\Scripts\activate
          pip install -r requirements.txt

      - name: Generate version info
        run: |
          .\.venv\Scripts\activate
          python tools/generate_version_info.py

      - name: Build executable
        run: |
          .\.venv\Scripts\activate
          python -m PyInstaller --clean "APO Studio.spec"

      - name: Compile Inno Setup
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: installer/Apo Studio.iss
          options: /O+

      - name: Get version
        id: version
        shell: python
        run: |
          import re
          content = open("src/app_info.py").read()
          version = re.search(r'VERSION\s*=\s*"(.+?)"', content).group(1)
          print(f"version={version}")

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: APOStudio_Setup_${{ steps.version.outputs.version }}
          path: installer/output/APOStudio_Setup_*.exe

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "APO Studio v${{ steps.version.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          body_path: installer/changelog.txt
          files: installer/output/APOStudio_Setup_*.exe
          draft: false
          prerelease: false
