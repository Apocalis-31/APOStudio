name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(python -c "import re; print(re.search(r'VERSION\s*=\s*\"(.+?)\"', open('src/app_info.py').read()).group(1))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    runs-on: windows-latest
    strategy:
      matrix:
        variant: [GPU, CPU]
        include:
          - variant: GPU
            spec: "APO Studio.spec"
            iss: "installer/Apo Studio.iss"
          - variant: CPU
            spec: "APO Studio CPU.spec"
            iss: "installer/Apo Studio CPU.iss"

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .\.venv\Scripts\activate
          pip install -r requirements.txt

      - name: Generate version info
        run: |
          .\.venv\Scripts\activate
          python tools/generate_version_info.py

      - name: Build executable (${{ matrix.variant }})
        run: |
          .\.venv\Scripts\activate
          python -m PyInstaller --clean "${{ matrix.spec }}"

      - name: Compile Inno Setup (${{ matrix.variant }})
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.9
        with:
          path: ${{ matrix.iss }}
          options: /O+

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: installer-${{ matrix.variant }}
          path: installer/output/APOStudio_Setup*.exe

  release:
    needs: [version, build]
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: installer/output
          pattern: installer-*
          merge-multiple: true

      - name: Delete old release assets
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          EXISTING=$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets --jq '.assets[].name' 2>/dev/null || true)
          for asset in $EXISTING; do
            echo "Deleting old asset: $asset"
            gh release delete-asset "$TAG" "$asset" --repo "${{ github.repository }}" --yes 2>/dev/null || true
          done

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          name: "APO Studio v${{ needs.version.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          body_path: installer/changelog.txt
          files: |
            installer/output/APOStudio_Setup_*.exe
          draft: false
          prerelease: false
