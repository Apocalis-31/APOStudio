name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .\.venv\Scripts\activate
          pip install -r requirements.txt

      - name: Generate version info
        run: |
          .\.venv\Scripts\activate
          python tools/generate_version_info.py

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(python -c "import re; print(re.search(r'VERSION\s*=\s*\"(.+?)\"', open('src/app_info.py').read()).group(1))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build executable (GPU)
        run: |
          .\.venv\Scripts\activate
          python -m PyInstaller --clean "APO Studio.spec"

      - name: Compile Inno Setup (GPU)
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: installer/Apo Studio.iss
          options: /O+

      - name: Build executable (CPU)
        run: |
          .\.venv\Scripts\activate
          python -m PyInstaller --clean "APO Studio CPU.spec"

      - name: Compile Inno Setup (CPU)
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: installer/Apo Studio CPU.iss
          options: /O+

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: APOStudio_Setup_${{ steps.version.outputs.version }}
          path: |
            installer/output/APOStudio_Setup_${{ steps.version.outputs.version }}.exe
            installer/output/APOStudio_Setup_CPU_${{ steps.version.outputs.version }}.exe

      - name: Delete old release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          EXISTING=$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets --jq '.assets[].name' 2>/dev/null || true)
          for asset in $EXISTING; do
            echo "Deleting old asset: $asset"
            gh release delete-asset "$TAG" "$asset" --repo "${{ github.repository }}" --yes 2>/dev/null || true
          done

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "APO Studio v${{ steps.version.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          body_path: installer/changelog.txt
          files: |
            installer/output/APOStudio_Setup_${{ steps.version.outputs.version }}.exe
            installer/output/APOStudio_Setup_CPU_${{ steps.version.outputs.version }}.exe
          draft: false
          prerelease: false
